# === Font ===
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# === Scrollback ===
scrollback_lines 10000
scrollback_pager ~/.config/kitty/scrollback

# === Behavior ===
mouse_hide_wait  3.0
copy_on_select   yes

# === IPC (for font size changes on monitor switch) ===
allow_remote_control yes
listen_on unix:/tmp/kitty-{kitty_pid}

# === Colors: Catppuccin Frappé ===
foreground           #c6d0f5
background           #303446
selection_foreground #c6d0f5
selection_background #44495d
cursor               #f2d5cf
cursor_text_color    #303446

# black
color0  #51576d
color8  #626880
# red
color1  #e78284
color9  #e78284
# green
color2  #a6d189
color10 #a6d189
# yellow
color3  #e5c890
color11 #e5c890
# blue
color4  #8caaee
color12 #8caaee
# magenta
color5  #f4b8e4
color13 #f4b8e4
# cyan
color6  #81c8be
color14 #81c8be
# white
color7  #b5bfe2
color15 #a5adce

# === Keybindings ===
# Match ghostty scroll behavior
map ctrl+page_up         scroll_line_up
map ctrl+page_down       scroll_line_down
map ctrl+shift+page_up   combine : scroll_line_up : scroll_line_up : scroll_line_up : scroll_line_up : scroll_line_up
map ctrl+shift+page_down combine : scroll_line_down : scroll_line_down : scroll_line_down : scroll_line_down : scroll_line_down

# Open scrollback (alt+y = yank workflow)
map alt+y show_scrollback

# use shift+enter for claude-code newline
map shift+enter send_text all \x1b\x0d
